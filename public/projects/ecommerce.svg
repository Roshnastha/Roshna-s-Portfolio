<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgGrad)"/>
  
  <!-- Shopping cart icon -->
  <g transform="translate(200, 80)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.3"/>
    <path d="M -15 -8 L -18 5 Q -18 8 -15 8 L 15 8 Q 18 8 18 5 L 20 -8" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-10" cy="12" r="2.5" fill="#60a5fa"/>
    <circle cx="10" cy="12" r="2.5" fill="#60a5fa"/>
  </g>
  
  <!-- Book icons -->
  <g transform="translate(100, 140)">
    <rect x="-8" y="-10" width="12" height="16" fill="none" stroke="#93c5fd" stroke-width="1.5" rx="1"/>
    <line x1="-4" y1="-10" x2="-4" y2="6" stroke="#93c5fd" stroke-width="1"/>
  </g>
  
  <g transform="translate(300, 140)">
    <rect x="-8" y="-10" width="12" height="16" fill="none" stroke="#93c5fd" stroke-width="1.5" rx="1"/>
    <line x1="-4" y1="-10" x2="-4" y2="6" stroke="#93c5fd" stroke-width="1"/>
  </g>
  
  <!-- Shopping text -->
  <text x="200" y="220" font-size="14" fill="#e0e7ff" text-anchor="middle" font-weight="500">MERN Bookstore</text>
</svg>