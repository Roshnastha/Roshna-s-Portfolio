<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgGrad3)"/>
  
  <!-- Ticket base -->
  <g transform="translate(200, 95)">
    <rect x="-28" y="-20" width="56" height="40" fill="none" stroke="#60a5fa" stroke-width="2.5" rx="3"/>
    <!-- Ticket perforations -->
    <circle cx="-28" cy="-10" r="1.5" fill="#60a5fa"/>
    <circle cx="-28" cy="0" r="1.5" fill="#60a5fa"/>
    <circle cx="-28" cy="10" r="1.5" fill="#60a5fa"/>
    <!-- Ticket details -->
    <text x="-15" y="-8" font-size="8" fill="#93c5fd" font-weight="bold">TICKET</text>
    <rect x="-18" y="0" width="10" height="8" fill="none" stroke="#60a5fa" stroke-width="1"/>
    <text x="-14" y="6" font-size="6" fill="#60a5fa" text-anchor="middle">#001</text>
  </g>
  
  <!-- Blockchain chain -->
  <g transform="translate(200, 160)">
    <!-- Links -->
    <circle cx="-20" cy="0" r="4" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#60a5fa" stroke-width="1.5"/>
    <circle cx="20" cy="0" r="4" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <!-- Dots inside circles -->
    <circle cx="-20" cy="0" r="1.5" fill="#60a5fa"/>
    <circle cx="20" cy="0" r="1.5" fill="#60a5fa"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="220" font-size="14" fill="#e0e7ff" text-anchor="middle" font-weight="500">NFT Ticketing</text>
</svg>