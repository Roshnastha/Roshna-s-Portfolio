<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgGrad2)"/>
  
  <!-- Document icon -->
  <g transform="translate(200, 85)">
    <rect x="-20" y="-30" width="40" height="55" fill="none" stroke="#60a5fa" stroke-width="2" rx="2"/>
    <!-- Lines representing text -->
    <line x1="-15" y1="-20" x2="10" y2="-20" stroke="#93c5fd" stroke-width="1.5"/>
    <line x1="-15" y1="-12" x2="15" y2="-12" stroke="#93c5fd" stroke-width="1.5"/>
    <line x1="-15" y1="-4" x2="15" y2="-4" stroke="#93c5fd" stroke-width="1.5"/>
    <line x1="-15" y1="4" x2="12" y2="4" stroke="#93c5fd" stroke-width="1.5"/>
  </g>
  
  <!-- Arrow representing transformation -->
  <g transform="translate(200, 155)">
    <path d="M -25 0 L -15 0" stroke="#60a5fa" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M -12 -4 L 0 0 L -12 4" stroke="#60a5fa" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Summary text box -->
  <g transform="translate(200, 155)">
    <rect x="10" y="-12" width="22" height="24" fill="none" stroke="#60a5fa" stroke-width="1.5" rx="1"/>
    <line x1="14" y1="-8" x2="26" y2="-8" stroke="#93c5fd" stroke-width="1"/>
    <line x1="14" y1="-2" x2="26" y2="-2" stroke="#93c5fd" stroke-width="1"/>
    <line x1="14" y1="4" x2="22" y2="4" stroke="#93c5fd" stroke-width="1"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="220" font-size="14" fill="#e0e7ff" text-anchor="middle" font-weight="500">Text Summarizer</text>
</svg>